                        { id: 12, name: "Aprovação da SC", start: dateUtils.format(dateUtils.addDays(today, -1)), end: dateUtils.format(dateUtils.addDays(today, 2)), progress: 80, color: "blue", dependencies: [11], parentId: 1 },
                        { id: 13, name: "Assinatura do Contrato", start: dateUtils.format(dateUtils.addDays(today, 3)), end: dateUtils.format(dateUtils.addDays(today, 5)), progress: 0, color: "blue", dependencies: [12], parentId: 1 },
                        { id: 2, name: "SISTEMA ELÉTRICO", start: dateUtils.format(dateUtils.addDays(today, 6)), end: dateUtils.format(dateUtils.addDays(today, 20)), progress: 0, color: "gray", team: "DOTM", dependencies: [], expanded: true, parentId: null },
                        { id: 21, name: "Compra de cabos", start: dateUtils.format(dateUtils.addDays(today, 6)), end: dateUtils.format(dateUtils.addDays(today, 10)), progress: 0, color: "orange", dependencies: [], parentId: 2 },
                    ];
                }
            }

            function exportData() {
                // Formatting JSON with 2 spaces for better readability in text editors
                const jsonStr = JSON.stringify(tasks, null, 2);
                const blob = new Blob([jsonStr], { type: "application/json;charset=utf-8;" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                const filename = getExportFilename('json');
                
                link.setAttribute("href", url);
                link.setAttribute("download", filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Limpeza de memória
                URL.revokeObjectURL(url);
            }

            function exportToCSV() {
                const headers = ["ID", "Nome da Tarefa", "Equipe", "Data Início", "Data Fim", "Duração (Dias)", "Progresso", "ID Pai", "Dependências", "Etapas (Milestones)"];
                
                const safe = (str) => {
                    if (str === null || str === undefined) return '';
                    const s = String(str);
                    // Se contiver vírgula, aspa ou quebra de linha, envolve em aspas duplas (padrão CSV)
                    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
                        return `"${s.replace(/"/g, '""')}"`;
                    }
                    return s;
                };

                const rows = tasks.map(t => {
                    const duration = dateUtils.diffDays(dateUtils.parseDate(t.start), dateUtils.parseDate(t.end));
                    
                    // Converte array de objetos de etapas para uma string legível
                    let milestonesStr = "";
                    if (t.milestones && t.milestones.length > 0) {
                        milestonesStr = t.milestones.map(m => `${m.name} (${m.date})`).join('; ');
                    }

                    return [
                        t.id,
                        safe(t.name),
                        safe(t.team || ""),
                        t.start,
                        t.end,
                        duration,
                        `${t.progress}%`,
                        t.parentId || "",
                        safe((t.dependencies || []).join(',')),
                        safe(milestonesStr)
                    ].join(',');
                });

                // \uFEFF é o BOM (Byte Order Mark) que força o Excel a abrir arquivos CSV com UTF-8 (mantendo acentos)
                const csvContent = "\uFEFF" + headers.join(',') + "\n" + rows.join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                const filename = getExportFilename('csv');
                
                link.setAttribute("href", url);
                link.setAttribute("download", filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Limpeza de memória
                URL.revokeObjectURL(url);
            }

            function importData(input) {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (Array.isArray(json)) {
                            tasks = json;
                            saveToStorage();
                            setViewMode('day'); // reset render and bounds
                        } else {
                            alert('Formato JSON inválido');
                        }
                    } catch (err) {
                        alert('Erro ao ler o ficheiro');
                    }
                };
                reader.readAsText(file);
                input.value = ''; 
            }

            return {
                init,
                openModal,
                closeModal,
                saveTask,
                deleteTask,
                setViewMode,
                toggleGroup,
                exportData,
                importData,
                exportToCSV,
                toggleTask,
                openMilestoneModal,
                closeMilestoneModal,
                addMilestoneRow,
                saveMilestones,
                scrollToToday,
                openSortModal,
                closeSortModal,
                applySort,
                clearSort
            };
        })();

        window.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
